services:
  adguardhome:
    image: ghcr.io/rafaelfgomes/adguardhome
    container_name: adguardhome-app
    hostname: adguardhome
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TIMEZONE:-Etc/UTC}
    volumes:
      - ./data:/opt/adguardhome
    restart: unless-stopped
    ports:
      - '53:53'
      - '80:80/tcp'
      - '443:443/tcp'
      - '784:784/udp'
      - '853:853'
      - '3000:3000/tcp'
      - '5443:5443'
      - '8853:8853/udp'
    networks:
      local:

networks:
  local:
    name: adguardhome-local-network